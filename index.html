<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary Nanu & Nani</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="title">
                <span class="heart">💕</span>
                Happy Anniversary
                <span class="heart">💕</span>
            </h1>
            <p class="subtitle">Nanu & Nani</p>
            <p class="message">Celebrating your beautiful journey together</p>
        </div>

        <div class="gallery-section">
            <h2>Memories</h2>
            <div class="gallery">
                <div class="gallery-item">
                    <img src="sgmi/1.jpg" alt="Memory 1">
                    <div class="overlay">Memories</div>
                </div>
                <div class="gallery-item">
                    <img src="sgmi/2.jpg" alt="Memory 2">
                    <div class="overlay">Love</div>
                </div>
                <div class="gallery-item">
                    <img src="sgmi/3.jpg" alt="Memory 3">
                    <div class="overlay">Together</div>
                </div>
                <div class="gallery-item">
                    <img src="sgmi/4.jpg" alt="Memory 4">
                    <div class="overlay">Forever</div>
                </div>
                <div class="gallery-item">
                    <img src="sgmi/5.jpg" alt="Memory 5">
                    <div class="overlay">Happy</div>
                </div>
                <div class="gallery-item">
                    <img src="sgmi/6.jpg" alt="Memory 6">
                    <div class="overlay">Smile</div>
                </div>
            </div>
        </div>

        <div class="message-box">
            <p>Here's to love, laughter, and happily ever after! 🎉</p>
        </div>
    </div>
</body>
</html>
